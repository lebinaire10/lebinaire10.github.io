<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecteur IPTV Web</title>
    <!-- hls.js pour lire les flux HLS -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@0.14.17/dist/hls.min.js">
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            background: #1a1a2e;
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid #2a2a4a;
        }
        h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .load-section {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .load-section input[type="file"] {
            display: none;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        .btn-primary {
            background: #f7971e;
            color: #1a1a2e;
        }
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(247, 151, 30, 0.3);
        }
        .btn-secondary {
            background: #2a2a4a;
            color: #e0e0e0;
        }
        .btn-secondary:hover {
            background: #3a3a5a;
        }
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .url-input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .url-input-group input {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #2a2a4a;
            background: #1a1a2e;
            color: #e0e0e0;
            min-width: 280px;
            font-size: 0.9rem;
        }
        .url-input-group input:focus {
            outline: none;
            border-color: #f7971e;
            box-shadow: 0 0 10px rgba(247, 151, 30, 0.2);
        }
        .main-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
        .playlist-panel {
            background: #1a1a2e;
            border-radius: 12px;
            border: 1px solid #2a2a4a;
            padding: 15px;
            max-height: 70vh;
            overflow-y: auto;
        }
        .playlist-panel h2 {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 15px;
            border-bottom: 1px solid #2a2a4a;
            padding-bottom: 10px;
        }
        .channel-item {
            padding: 10px 12px;
            margin-bottom: 4px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.15s ease;
        }
        .channel-item:hover {
            background: #2a2a4a;
        }
        .channel-item.active {
            background: #f7971e;
            color: #1a1a2e;
            font-weight: 600;
        }
        .channel-item .logo {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            object-fit: cover;
            background: #0f0f1a;
            flex-shrink: 0;
        }
        .channel-item .name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.9rem;
        }
        .video-panel {
            background: #0a0a12;
            border-radius: 12px;
            border: 1px solid #2a2a4a;
            aspect-ratio: 16/9;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-panel video {
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
        }
        .video-placeholder {
            color: #555;
            text-align: center;
            padding: 20px;
        }
        .video-placeholder span {
            font-size: 3rem;
            display: block;
            margin-bottom: 15px;
        }
        .status-bar {
            margin-top: 15px;
            padding: 10px 15px;
            background: #1a1a2e;
            border-radius: 8px;
            border: 1px solid #2a2a4a;
            font-size: 0.85rem;
            color: #aaa;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .status-bar .count {
            color: #f7971e;
            font-weight: 600;
        }
        .channel-count {
            color: #f7971e;
            font-weight: 600;
        }
        /* Scrollbar personnalisée */
        .playlist-panel::-webkit-scrollbar {
            width: 6px;
        }
        .playlist-panel::-webkit-scrollbar-track {
            background: #0f0f1a;
            border-radius: 8px;
        }
        .playlist-panel::-webkit-scrollbar-thumb {
            background: #2a2a4a;
            border-radius: 8px;
        }
        .playlist-panel::-webkit-scrollbar-thumb:hover {
            background: #3a3a5a;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- En-tête -->
        <header>
            <h1>📺 IPTV Web Player</h1>
            <div class="load-section">
                <!-- Chargement fichier local -->
                <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                    📂 Charger un fichier .m3u
                </button>
                <input type="file" id="fileInput" accept=".m3u,.m3u8" onchange="loadFile(event)">

                <!-- Chargement par URL -->
                <div class="url-input-group">
                    <input type="text" id="urlInput" placeholder="https://exemple.com/playlist.m3u" value="https://lebinaire10.github.io/beinsport.m3u">
                    <button class="btn btn-secondary" onclick="loadURL()">🌐 Charger</button>
                </div>
            </div>
        </header>

        <!-- Corps principal -->
        <div class="main-grid">
            <!-- Liste des chaînes -->
            <div class="playlist-panel" id="playlistPanel">
                <h2>📋 Liste des chaînes <span class="channel-count" id="channelCount">(0)</span></h2>
                <div id="channelList">
                    <div class="video-placeholder" style="padding:40px 0; color:#444;">
                        <span>📡</span>
                        <p>Chargez une playlist pour commencer</p>
                    </div>
                </div>
            </div>

            <!-- Lecteur vidéo -->
            <div class="video-panel" id="videoPanel">
                <video id="videoPlayer" controls autoplay playsinline></video>
                <div class="video-placeholder" id="placeholder">
                    <span>🎬</span>
                    <p>Sélectionnez une chaîne</p>
                </div>
            </div>
        </div>

        <!-- Barre d'état -->
        <div class="status-bar" id="statusBar">
            <span>📊 <span id="statusText">Prêt</span></span>
            <span>🔗 <span id="currentChannelName">-</span></span>
        </div>
    </div>

    <script>
        // ============================================================
        // 1. ÉTAT DE L'APPLICATION
        // ============================================================
        let channels = [];
        let currentChannelIndex = -1;
        const video = document.getElementById('videoPlayer');
        const placeholder = document.getElementById('placeholder');
        const channelList = document.getElementById('channelList');
        const statusText = document.getElementById('statusText');
        const currentChannelName = document.getElementById('currentChannelName');
        const channelCountSpan = document.getElementById('channelCount');

        // ============================================================
        // 2. PARSEUR DE PLAYLIST M3U
        // ============================================================
        function parseM3U(data) {
            const lines = data.split(/\r?\n/);
            const result = [];
            let current = null;

            for (let line of lines) {
                line = line.trim();
                if (!line) continue;

                // Ligne d'information étendue
                if (line.startsWith('#EXTINF:')) {
                    // Extraire le nom (après la dernière virgule)
                    const nameMatch = line.match(/,(.+)$/);
                    const name = nameMatch ? nameMatch[1].trim() : 'Chaîne inconnue';
                    // Extraire le logo (tvg-logo)
                    const logoMatch = line.match(/tvg-logo="([^"]*)"/);
                    const logo = logoMatch ? logoMatch[1] : '';
                    current = { name, logo, url: '' };
                }
                // URL du flux (on ignore les autres lignes commençant par #)
                else if (current && !line.startsWith('#')) {
                    current.url = line;
                    // Si l'URL semble valide, on ajoute la chaîne
                    if (current.url.startsWith('http://') || current.url.startsWith('https://')) {
                        result.push({ ...current });
                    }
                    current = null;
                }
            }
            return result;
        }

        // ============================================================
        // 3. CHARGEMENT DES PLAYLISTS
        // ============================================================
        function loadFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                processPlaylist(content, file.name);
            };
            reader.readAsText(file);
            // Réinitialiser l'input pour permettre de recharger le même fichier
            event.target.value = '';
        }

        function loadURL() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                statusText.textContent = '⚠️ Veuillez entrer une URL valide';
                return;
            }
            statusText.textContent = '⏳ Téléchargement de la playlist...';
            fetch(url)
                .then(res => {
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.text();
                })
                .then(data => processPlaylist(data, url))
                .catch(err => {
                    statusText.textContent = `❌ Erreur : ${err.message}`;
                    console.error(err);
                });
        }

        function processPlaylist(data, source) {
            channels = parseM3U(data);
            if (channels.length === 0) {
                statusText.textContent = '⚠️ Aucune chaîne trouvée dans cette playlist';
                return;
            }
            statusText.textContent = `✅ ${channels.length} chaînes chargées depuis ${source}`;
            renderChannels();
            // Si des chaînes existent, sélectionner la première automatiquement
            if (channels.length > 0) {
                selectChannel(0);
            }
        }

        // ============================================================
        // 4. AFFICHAGE DE LA LISTE
        // ============================================================
        function renderChannels() {
            channelCountSpan.textContent = `(${channels.length})`;

            if (channels.length === 0) {
                channelList.innerHTML = `
                            <div class="video-placeholder" style="padding:40px 0; color:#444;">
                                <span>📡</span>
                                <p>Aucune chaîne dans cette playlist</p>
                            </div>
                        `;
                return;
            }

            let html = '';
            channels.forEach((ch, index) => {
                const active = index === currentChannelIndex ? 'active' : '';
                const logoHtml = ch.logo ?
                    `<img class="logo" src="${ch.logo}" alt="" loading="lazy" onerror="this.style.display='none'">` :
                    `<div class="logo" style="background:#2a2a4a; display:flex; align-items:center; justify-content:center; color:#555; font-size:12px;">📺</div>`;
                html += `
                            <div class="channel-item ${active}" data-index="${index}" onclick="selectChannel(${index})">
                                ${logoHtml}
                                <span class="name">${ch.name}</span>
                            </div>
                        `;
            });
            channelList.innerHTML = html;
        }

        // ============================================================
        // 5. SÉLECTION ET LECTURE D'UNE CHAÎNE
        // ============================================================
        function selectChannel(index) {
            if (index < 0 || index >= channels.length) return;
            currentChannelIndex = index;
            const channel = channels[index];
            currentChannelName.textContent = channel.name || 'Chaîne';

            // Mise à jour de la liste (changement de classe active)
            document.querySelectorAll('.channel-item').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });

            // Lecture du flux
            playStream(channel.url);

            // Mise à jour du statut
            statusText.textContent = `▶️ Lecture de : ${channel.name}`;
        }

        function playStream(url) {
            // Cacher le placeholder
            placeholder.style.display = 'none';
            video.style.display = 'block';

            // Si HLS est supporté nativement (Safari iOS)
            if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
            }
            // Sinon, utiliser hls.js
            else if (Hls.isSupported()) {
                const hls = new Hls({
                    debug: false,
                    enableWorker: true,
                    lowLatencyMode: true,
                });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(e => console.warn('Lecture auto bloquée', e));
                });
                // Nettoyer l'ancien hls si nécessaire
                if (window._hls) window._hls.destroy();
                window._hls = hls;
            }
            // Fallback : lecture directe (peu probable que ça fonctionne pour HLS)
            else {
                video.src = url;
            }
        }

        // ============================================================
        // 6. GESTION DES ERREURS DE LECTURE
        // ============================================================
        video.addEventListener('error', (e) => {
            console.warn('Erreur vidéo:', e);
            // Si le flux est inaccessible, on affiche un message
            if (video.error) {
                statusText.textContent = `⚠️ Erreur de lecture : ${video.error.message || 'flux inaccessible'}`;
            }
            // Réessayer en mode natif si hls.js a échoué
            if (window._hls) {
                window._hls.destroy();
                window._hls = null;
            }
            // On tente en direct (peut fonctionner pour certains flux)
            const currentUrl = video.src;
            if (currentUrl) {
                video.src = currentUrl;
            }
        });

        // ============================================================
        // 7. CHARGEMENT AUTOMATIQUE AU DÉMARRAGE
        // ============================================================
        // Pour charger automatiquement la playlist par défaut au chargement de la page
        window.addEventListener('load', () => {
            // Si l'URL par défaut est présente, la charger
            const defaultUrl = document.getElementById('urlInput').value;
            if (defaultUrl) {
                loadURL();
            }
        });

        // Support du glisser-déposer (optionnel, mais pratique)
        document.addEventListener('dragover', (e) => e.preventDefault());
        document.addEventListener('drop', (e) => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].name.endsWith('.m3u')) {
                const input = document.getElementById('fileInput');
                const dt = new DataTransfer();
                dt.items.add(files[0]);
                input.files = dt.files;
                loadFile({ target: { files: input.files, value: '' } });
            }
        });
        console.log('📺 Lecteur IPTV Web prêt !');
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecteur IPTV Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@0.14.17/dist/hls.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-tertiary: #1a2332;
            --accent: #f59e0b;
            --accent-hover: #fbbf24;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: #1e293b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            z-index: 100;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 28px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .app-title {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }
        .btn-outline:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent);
        }

        .btn-success {
            background: var(--success);
            color: #000;
            font-weight: 600;
        }
        .btn-success:hover {
            opacity: 0.9;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 0.75rem;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .url-input {
            padding: 8px 12px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            min-width: 250px;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .url-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        /* Main content */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 0;
        }

        /* Sidebar */
        .sidebar {
            width: 380px;
            min-width: 380px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s;
        }

        .sidebar.collapsed {
            width: 0;
            min-width: 0;
            border: none;
        }

        .sidebar-tools {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .search-box {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 10px 12px 10px 36px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }
        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .filter-bar {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .filter-chip:hover, .filter-chip.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            font-weight: 600;
        }

        .channel-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: var(--bg-tertiary);
            border-radius: var(--radius);
        }

        .stat-badge {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .stat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .dot-online { background: var(--success); }
        .dot-offline { background: var(--danger); }
        .dot-testing { background: var(--warning); }

        /* Channel list */
        .channel-list {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .channel-list::-webkit-scrollbar {
            width: 4px;
        }
        .channel-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .channel-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .channel-item {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(30, 41, 59, 0.5);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.15s;
            position: relative;
            border-left: 3px solid transparent;
        }
        .channel-item:hover {
            background: var(--bg-tertiary);
        }
        .channel-item.active {
            background: rgba(245, 158, 11, 0.1);
            border-left-color: var(--accent);
        }
        .channel-item.offline {
            opacity: 0.5;
        }

        .channel-logo {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            object-fit: contain;
            background: var(--bg-tertiary);
            flex-shrink: 0;
            border: 1px solid var(--border);
        }
        .channel-info {
            flex: 1;
            min-width: 0;
        }
        .channel-name {
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .channel-program {
            font-size: 0.7rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }
        .channel-status {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
        }
        .status-online { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .status-offline { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .status-testing { background: rgba(245, 158, 11, 0.2); color: var(--warning); }

        .channel-actions {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .channel-item:hover .channel-actions {
            opacity: 1;
        }

        /* Player section */
        .player-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
        }

        .video-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            min-height: 400px;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            max-height: calc(100vh - 150px);
            object-fit: contain;
        }

        .placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--text-secondary);
        }
        .placeholder-icon {
            font-size: 5rem;
            margin-bottom: 16px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .player-controls {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }
        .np-logo {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            object-fit: contain;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
        }
        .np-info {
            min-width: 0;
        }
        .np-name {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .np-program {
            font-size: 0.75rem;
            color: var(--accent);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mini-guide {
            padding: 6px 10px;
            background: var(--bg-tertiary);
            border-radius: var(--radius);
            font-size: 0.7rem;
            color: var(--text-secondary);
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: var(--radius);
            z-index: 1000;
            animation: slideIn 0.3s ease;
            font-size: 0.85rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 70vh;
            overflow-y: auto;
        }
        .modal h3 {
            margin-bottom: 16px;
            color: var(--accent);
        }
        .epg-item {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
        }
        .epg-time {
            color: var(--accent);
            font-weight: 600;
            margin-right: 8px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 300;
                width: 100%;
                max-width: 380px;
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .mobile-toggle {
                display: flex !important;
            }
            .url-input {
                min-width: 150px;
            }
        }
        .mobile-toggle {
            display: none;
            position: fixed;
            top: 80px;
            left: 10px;
            z-index: 301;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo-section">
                <span class="logo-icon">📺</span>
                <span class="app-title">IPTV Pro</span>
            </div>
            <div class="controls">
                <input type="text" class="url-input" id="urlInput" 
                       placeholder="URL de la playlist M3U..." 
                       value="https://lebinaire10.github.io/beinsport.m3u">
                <button class="btn btn-primary" onclick="loadURL()">
                    🌐 Charger URL
                </button>
                <button class="btn btn-outline" onclick="document.getElementById('fileInput').click()">
                    📂 Fichier
                </button>
                <input type="file" id="fileInput" accept=".m3u,.m3u8,.m3uplus" 
                       onchange="loadFile(event)" style="display:none">
                <button class="btn btn-success btn-sm" onclick="testAllChannels()" id="btnTestAll">
                    🔍 Tester tout
                </button>
                <button class="btn btn-outline btn-sm" onclick="toggleSidebar()" id="btnToggleSidebar">
                    ☰
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-tools">
                    <div class="search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" class="search-input" id="searchInput" 
                               placeholder="Rechercher une chaîne..." 
                               oninput="filterChannels()">
                    </div>
                    <div class="filter-bar">
                        <span class="filter-chip active" data-filter="all" onclick="setFilter('all', this)">Toutes</span>
                        <span class="filter-chip" data-filter="online" onclick="setFilter('online', this)">✅ En ligne</span>
                        <span class="filter-chip" data-filter="offline" onclick="setFilter('offline', this)">❌ Hors ligne</span>
                        <span class="filter-chip" data-filter="favorites" onclick="setFilter('favorites', this)">⭐ Favoris</span>
                    </div>
                    <div class="channel-stats">
                        <span class="stat-badge">
                            <span class="stat-dot dot-online"></span> 
                            <span id="onlineCount">0</span> en ligne
                        </span>
                        <span class="stat-badge">
                            <span class="stat-dot dot-offline"></span> 
                            <span id="offlineCount">0</span> hors ligne
                        </span>
                        <span>Total: <strong id="totalCount">0</strong></span>
                    </div>
                </div>
                <div class="channel-list" id="channelList">
                    <div class="placeholder" style="position:relative; transform:none; top:40%;">
                        <div class="placeholder-icon">📡</div>
                        <p>Chargez une playlist</p>
                    </div>
                </div>
            </aside>

            <!-- Player -->
            <section class="player-section">
                <div class="video-container" id="videoContainer">
                    <video id="videoPlayer" controls autoplay playsinline style="display:none"></video>
                    <div class="placeholder" id="placeholder">
                        <div class="placeholder-icon">🎬</div>
                        <p>Sélectionnez une chaîne</p>
                        <p style="font-size:0.8rem; margin-top:8px;">Les chaînes testées sont marquées ✅</p>
                    </div>
                </div>
                <div class="player-controls">
                    <div class="now-playing">
                        <img class="np-logo" id="npLogo" src="" alt="" 
                             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📺</text></svg>'">
                        <div class="np-info">
                            <div class="np-name" id="npName">-</div>
                            <div class="np-program" id="npProgram"></div>
                        </div>
                    </div>
                    <button class="btn btn-outline btn-sm" onclick="showEPG()" id="btnEPG" style="display:none">
                        📋 Programme TV
                    </button>
                </div>
            </section>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toastContainer"></div>

    <!-- EPG Modal -->
    <div class="modal-overlay" id="epgModal" style="display:none" onclick="if(event.target===this)closeEPG()">
        <div class="modal">
            <h3>📋 Programme TV - <span id="epgChannelName"></span></h3>
            <div id="epgContent">
                <p style="color:var(--text-secondary)">Chargement du programme...</p>
            </div>
            <button class="btn btn-outline" style="margin-top:12px" onclick="closeEPG()">Fermer</button>
        </div>
    </div>

    <button class="btn btn-primary btn-icon mobile-toggle" id="mobileToggle" 
            onclick="toggleSidebar()" style="display:none">☰</button>

    <script>
        // ============================================================
        // APPLICATION STATE
        // ============================================================
        const state = {
            channels: [],
            currentIndex: -1,
            filter: 'all',
            favorites: JSON.parse(localStorage.getItem('iptv_favorites') || '[]'),
            testingInProgress: false,
            epgCache: {}
        };

        // DOM references
        const video = document.getElementById('videoPlayer');
        const placeholder = document.getElementById('placeholder');
        const channelList = document.getElementById('channelList');
        const searchInput = document.getElementById('searchInput');
        const onlineCount = document.getElementById('onlineCount');
        const offlineCount = document.getElementById('offlineCount');
        const totalCount = document.getElementById('totalCount');
        const npName = document.getElementById('npName');
        const npProgram = document.getElementById('npProgram');
        const npLogo = document.getElementById('npLogo');
        const btnEPG = document.getElementById('btnEPG');
        const btnTestAll = document.getElementById('btnTestAll');

        // ============================================================
        // M3U PARSER (Enhanced)
        // ============================================================
        function parseM3U(data) {
            const lines = data.split(/\r?\n/);
            const channels = [];
            let current = null;

            for (let line of lines) {
                line = line.trim();
                if (!line) continue;

                if (line.startsWith('#EXTINF:')) {
                    const nameMatch = line.match(/,(.+)$/);
                    const name = nameMatch ? nameMatch[1].trim() : 'Chaîne inconnue';
                    
                    // Extract attributes
                    const attrs = {};
                    const attrRegex = /([a-zA-Z-]+)="([^"]*)"/g;
                    let match;
                    while ((match = attrRegex.exec(line)) !== null) {
                        attrs[match[1]] = match[2];
                    }

                    current = {
                        name,
                        logo: attrs['tvg-logo'] || '',
                        id: attrs['tvg-id'] || '',
                        group: attrs['group-title'] || 'Non classé',
                        url: '',
                        status: 'unknown', // unknown, online, offline, testing
                        program: null
                    };
                } else if (current && !line.startsWith('#')) {
                    if (line.startsWith('http://') || line.startsWith('https://')) {
                        current.url = line;
                        channels.push({ ...current });
                    }
                    current = null;
                }
            }
            return channels;
        }

        // ============================================================
        // CHANNEL TESTING (Check if stream is accessible)
        // ============================================================
        async function testChannel(index) {
            const channel = state.channels[index];
            if (!channel || !channel.url) return;
            
            channel.status = 'testing';
            renderChannels();
            updateStats();

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 8000);
                
                const response = await fetch(channel.url, {
                    method: 'HEAD',
                    mode: 'no-cors',
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                // If we get here without error, consider it online
                channel.status = 'online';
            } catch (error) {
                // Try alternative: check if URL is reachable via GET with range
                try {
                    const controller2 = new AbortController();
                    const timeoutId2 = setTimeout(() => controller2.abort(), 5000);
                    
                    await fetch(channel.url, {
                        method: 'GET',
                        headers: { 'Range': 'bytes=0-1024' },
                        mode: 'no-cors',
                        signal: controller2.signal
                    });
                    
                    clearTimeout(timeoutId2);
                    channel.status = 'online';
                } catch (e2) {
                    channel.status = 'offline';
                }
            }

            renderChannels();
            updateStats();
        }

        async function testAllChannels() {
            if (state.testingInProgress) return;
            state.testingInProgress = true;
            btnTestAll.textContent = '⏳ Test...';
            btnTestAll.disabled = true;
            
            showToast(`Test de ${state.channels.length} chaînes en cours...`);
            
            const batchSize = 5;
            for (let i = 0; i < state.channels.length; i += batchSize) {
                const batch = [];
                for (let j = i; j < Math.min(i + batchSize, state.channels.length); j++) {
                    batch.push(testChannel(j));
                }
                await Promise.allSettled(batch);
                
                // Update progress
                const progress = Math.min(i + batchSize, state.channels.length);
                btnTestAll.textContent = `⏳ ${progress}/${state.channels.length}`;
            }
            
            state.testingInProgress = false;
            btnTestAll.textContent = '🔍 Tester tout';
            btnTestAll.disabled = false;
            
            const onlineCount = state.channels.filter(c => c.status === 'online').length;
            showToast(`✅ Test terminé : ${onlineCount}/${state.channels.length} chaînes en ligne`);
        }

        // ============================================================
        // EPG / PROGRAM GUIDE (Simulated - would need real EPG source)
        // ============================================================
        async function fetchEPG(channelId) {
            // This is a simulation. In production, you'd fetch from an EPG API
            // like XMLTV or a provider's EPG endpoint
            if (state.epgCache[channelId]) return state.epgCache[channelId];
            
            // Simulate EPG data
            const programs = [
                { time: '20:00', title: 'Journal', desc: 'Actualités du jour' },
                { time: '20:30', title: 'Film: Action', desc: 'Film d\'action palpitant' },
                { time: '22:00', title: 'Documentaire', desc: 'Découverte du monde' },
                { time: '23:00', title: 'Sport', desc: 'Résumé des matchs' },
                { time: '00:00', title: 'Rediffusion', desc: 'Meilleurs moments' }
            ];
            
            state.epgCache[channelId] = programs;
            return programs;
        }

        async function showEPG() {
            if (state.currentIndex < 0) return;
            const channel = state.channels[state.currentIndex];
            document.getElementById('epgChannelName').textContent = channel.name;
            document.getElementById('epgModal').style.display = 'flex';
            
            const epgContent = document.getElementById('epgContent');
            epgContent.innerHTML = '<p style="color:var(--text-secondary)">Chargement du programme...</p>';
            
            const programs = await fetchEPG(channel.id || channel.name);
            
            epgContent.innerHTML = programs.map(p => `
                <div class="epg-item">
                    <span class="epg-time">${p.time}</span>
                    <strong>${p.title}</strong>
                    <br><small style="color:var(--text-secondary)">${p.desc}</small>
                </div>
            `).join('');
        }

        function closeEPG() {
            document.getElementById('epgModal').style.display = 'none';
        }

        // ============================================================
        // RENDERING
        // ============================================================
        function filterChannels() {
            renderChannels();
        }

        function setFilter(filter, element) {
            state.filter = filter;
            document.querySelectorAll('.filter-chip').forEach(el => el.classList.remove('active'));
            if (element) element.classList.add('active');
            renderChannels();
        }

        function renderChannels() {
            const searchTerm = searchInput.value.toLowerCase();
            
            let filtered = state.channels.filter(ch => {
                // Search filter
                if (searchTerm && !ch.name.toLowerCase().includes(searchTerm) && 
                    !ch.group.toLowerCase().includes(searchTerm)) {
                    return false;
                }
                
                // Status filter
                if (state.filter === 'online' && ch.status !== 'online') return false;
                if (state.filter === 'offline' && ch.status !== 'offline') return false;
                if (state.filter === 'favorites' && !state.favorites.includes(ch.url)) return false;
                
                return true;
            });

            if (filtered.length === 0) {
                channelList.innerHTML = `
                    <div class="placeholder" style="position:relative; transform:none; top:40%;">
                        <div class="placeholder-icon">🔍</div>
                        <p>Aucune chaîne trouvée</p>
                    </div>`;
                return;
            }

            channelList.innerHTML = filtered.map(ch => {
                const originalIndex = state.channels.indexOf(ch);
                const isActive = originalIndex === state.currentIndex;
                const isFavorite = state.favorites.includes(ch.url);
                
                let statusClass = '';
                let statusLabel = '';
                if (ch.status === 'online') { statusClass = 'status-online'; statusLabel = 'OK'; }
                else if (ch.status === 'offline') { statusClass = 'status-offline'; statusLabel = 'OFF'; }
                else if (ch.status === 'testing') { statusClass = 'status-testing'; statusLabel = '...'; }
                
                return `
                    <div class="channel-item ${isActive ? 'active' : ''} ${ch.status === 'offline' ? 'offline' : ''}" 
                         onclick="selectChannel(${originalIndex})" data-index="${originalIndex}">
                        <img class="channel-logo" src="${ch.logo}" alt="" 
                             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📺</text></svg>'">
                        <div class="channel-info">
                            <div class="channel-name">${ch.name}</div>
                            <div class="channel-program">${ch.program || ch.group || ''}</div>
                        </div>
                        ${ch.status !== 'unknown' ? `<span class="channel-status ${statusClass}">${statusLabel}</span>` : ''}
                        <div class="channel-actions">
                            <button class="btn btn-outline btn-sm" onclick="event.stopPropagation(); toggleFavorite(${originalIndex})" 
                                    title="${isFavorite ? 'Retirer des favoris' : 'Ajouter aux favoris'}">
                                ${isFavorite ? '⭐' : '☆'}
                            </button>
                            <button class="btn btn-outline btn-sm" onclick="event.stopPropagation(); testChannel(${originalIndex})" 
                                    title="Tester la chaîne">
                                🔍
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            
            updateStats();
        }

        function updateStats() {
            totalCount.textContent = state.channels.length;
            onlineCount.textContent = state.channels.filter(c => c.status === 'online').length;
            offlineCount.textContent = state.channels.filter(c => c.status === 'offline').length;
        }

        function toggleFavorite(index) {
            const channel = state.channels[index];
            const favIndex = state.favorites.indexOf(channel.url);
            
            if (favIndex >= 0) {
                state.favorites.splice(favIndex, 1);
                showToast(`⭐ Retiré des favoris : ${channel.name}`);
            } else {
                state.favorites.push(channel.url);
                showToast(`⭐ Ajouté aux favoris : ${channel.name}`);
            }
            
            localStorage.setItem('iptv_favorites', JSON.stringify(state.favorites));
            renderChannels();
        }

        // ============================================================
        // PLAYBACK
        // ============================================================
        function selectChannel(index) {
            if (index < 0 || index >= state.channels.length) return;
            state.currentIndex = index;
            const channel = state.channels[index];
            
            // Update UI
            npName.textContent = channel.name;
            npLogo.src = channel.logo;
            npProgram.textContent = channel.program || `Groupe: ${channel.group}`;
            btnEPG.style.display = 'inline-block';
            
            // Update list
            document.querySelectorAll('.channel-item').forEach(el => {
                el.classList.toggle('active', parseInt(el.dataset.index) === index);
            });
            
            // Play
            playStream(channel.url);
            showToast(`▶️ ${channel.name}`);
        }

        function playStream(url) {
            placeholder.style.display = 'none';
            video.style.display = 'block';
            
            // Clean up previous HLS instance
            if (window._hls) {
                window._hls.destroy();
                window._hls = null;
            }
            
            if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
            } else if (Hls.isSupported()) {
                const hls = new Hls({
                    debug: false,
                    enableWorker: true,
                    lowLatencyMode: true,
                    maxBufferLength: 30
                });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => {});
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        showToast('❌ Erreur de lecture du flux');
                        hls.destroy();
                    }
                });
                window._hls = hls;
            } else {
                video.src = url;
            }
            
            video.play().catch(() => {});
        }

        // Video error handling
        video.addEventListener('error', () => {
            showToast('⚠️ Impossible de lire ce flux');
        });

        // ============================================================
        // LOADING
        // ============================================================
        function processPlaylist(data, source) {
            state.channels = parseM3U(data);
            state.currentIndex = -1;
            
            if (state.channels.length === 0) {
                showToast('⚠️ Aucune chaîne trouvée');
                return;
            }
            
            // Reset statuses
            state.channels.forEach(ch => ch.status = 'unknown');
            
            renderChannels();
            updateStats();
            showToast(`✅ ${state.channels.length} chaînes chargées`);
            
            // Auto-select first channel
            if (state.channels.length > 0) {
                selectChannel(0);
            }
        }

        function loadFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => processPlaylist(e.target.result, file.name);
            reader.readAsText(file);
            event.target.value = '';
        }

        function loadURL() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return;
            
            showToast('⏳ Chargement de la playlist...');
            
            fetch(url)
                .then(res => {
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.text();
                })
                .then(data => processPlaylist(data, url))
                .catch(err => showToast(`❌ Erreur: ${err.message}`));
        }

        // ============================================================
        // UTILITIES
        // ============================================================
        function showToast(message, duration = 3000) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey || e.target.tagName === 'INPUT') return;
            
            switch(e.key) {
                case 'ArrowUp':
                    e.preventDefault();
                    if (state.currentIndex > 0) selectChannel(state.currentIndex - 1);
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    if (state.currentIndex < state.channels.length - 1) selectChannel(state.currentIndex + 1);
                    break;
                case 'f':
                    if (state.currentIndex >= 0) toggleFavorite(state.currentIndex);
                    break;
                case 't':
                    if (state.currentIndex >= 0) testChannel(state.currentIndex);
                    break;
            }
        });

        // Drag and drop
        document.addEventListener('dragover', e => e.preventDefault());
        document.addEventListener('drop', e => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file && (file.name.endsWith('.m3u') || file.name.endsWith('.m3u8') || file.name.endsWith('.m3uplus'))) {
                const input = document.getElementById('fileInput');
                const dt = new DataTransfer();
                dt.items.add(file);
                input.files = dt.files;
                loadFile({ target: { files: input.files, value: '' } });
            }
        });

        // Auto-load on start
        window.addEventListener('load', () => {
            const defaultUrl = document.getElementById('urlInput').value;
            if (defaultUrl) loadURL();
        });

        // Handle responsive sidebar
        function handleResize() {
            const mobileToggle = document.getElementById('mobileToggle');
            if (window.innerWidth <= 768) {
                mobileToggle.style.display = 'flex';
                document.getElementById('sidebar').classList.add('collapsed');
            } else {
                mobileToggle.style.display = 'none';
                document.getElementById('sidebar').classList.remove('collapsed');
            }
        }
        window.addEventListener('resize', handleResize);
        handleResize();

        console.log('📺 IPTV Pro Player - Prêt avec test de chaînes, EPG et favoris !');
    </script>
</body>
    </html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PALGA WEB BYPASS - Ouverture clavier d'appel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #00d4ff, #e94560);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            color: #aaa;
            margin-top: 10px;
        }

        .price-tag {
            text-align: center;
            background: linear-gradient(135deg, #00d4ff20, #e9456020);
            border-radius: 50px;
            padding: 15px;
            margin-bottom: 30px;
        }

        .price {
            font-size: 2.5em;
            font-weight: bold;
            color: #ffd700;
        }

        .price small {
            font-size: 0.5em;
            color: #aaa;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: white;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1.1em;
            text-align: center;
            letter-spacing: 1px;
        }

        input:focus {
            outline: none;
            background: rgba(255,255,255,0.2);
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #00d4ff, #e94560);
            color: white;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,212,255,0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }

        .message.success {
            background: #2ecc71;
            display: block;
            animation: shake 0.5s;
        }

        .message.error {
            background: #e74c3c;
            display: block;
            animation: shake 0.5s;
        }

        .message.info {
            background: #3498db;
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-box {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            margin-top: 30px;
            text-align: center;
        }

        .info-box p {
            color: #aaa;
            font-size: 0.8em;
        }

        .contact {
            margin-top: 20px;
            text-align: center;
            color: #666;
            font-size: 0.7em;
        }

        .remaining-credit {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            color: #00d4ff;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🔓 PALGA WEB BYPASS</h1>
            <p>Ouverture du clavier d'appel</p>
        </div>

        <div class="price-tag">
            <div class="price">10 <small>crédits</small></div>
            <div style="color: #aaa; font-size: 0.8em;">par utilisation</div>
        </div>

        <div class="form-group">
            <label>📱 Votre ID PALGA</label>
            <input type="text" id="userId" placeholder="Ex: PALGA1234 ou DEMO" autocomplete="off">
        </div>

        <button id="bypassBtn" onclick="startBypass()">
            🔓 DÉBLOQUER & OUVRIR LE CLAVIER
        </button>

        <div id="resultMessage" class="message"></div>
        <div id="remainingCredit" class="remaining-credit" style="display: none;"></div>

        <div class="info-box">
            <p>ℹ️ Comment ça marche ?</p>
            <p style="font-size: 0.7em; margin-top: 5px;">
                1. Entrez votre ID PALGA<br>
                2. 10 crédits seront débités<br>
                3. Le clavier d'appel s'ouvrira automatiquement<br>
                4. Vous pouvez maintenant passer des appels
            </p>
        </div>

        <div class="contact">
            📞 Besoin de crédits ? Contactez +226 54641531
        </div>
    </div>

    <script>
        // Configuration
        const API_URL = 'https://palgatools-1.onrender.com/api';
        
        async function startBypass() {
            const userId = document.getElementById('userId').value.trim();
            const btn = document.getElementById('bypassBtn');
            const resultDiv = document.getElementById('resultMessage');
            
            // Vérifier si l'utilisateur a entré un ID
            if (!userId) {
                showMessage('Veuillez entrer votre ID PALGA', 'error');
                return;
            }
            
            // Désactiver le bouton pendant l'opération
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> Vérification en cours...';
            resultDiv.style.display = 'none';
            
            try {
                // Étape 1: Vérifier les crédits de l'utilisateur
                console.log('🔍 Vérification des crédits pour:', userId);
                
                const loginResponse = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier: userId, password: userId === 'ADMIN' ? 'Admin123' : 'Demo123' })
                });
                
                let userData = null;
                if (loginResponse.ok) {
                    userData = await loginResponse.json();
                }
                
                // Si login échoue, essayer de récupérer les infos via l'API user
                if (!userData || !userData.success) {
                    // Essayer de récupérer directement
                    const userResponse = await fetch(`${API_URL}/user/${userId}`);
                    if (userResponse.ok) {
                        userData = await userResponse.json();
                    }
                }
                
                if (!userData || (!userData.success && !userData.user_id)) {
                    showMessage('❌ ID non trouvé. Vérifiez votre ID PALGA', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '🔓 DÉBLOQUER & OUVRIR LE CLAVIER';
                    return;
                }
                
                const actualUserId = userData.user_id || userId;
                const currentCredit = userData.credit || 0;
                
                console.log(`💰 Crédits actuels: ${currentCredit}`);
                
                // Vérifier si assez de crédits
                if (currentCredit < 10) {
                    showMessage(`❌ Crédits insuffisants ! Vous avez ${currentCredit} crédits. Besoin de 10 crédits. Contactez +226 54641531`, 'error');
                    btn.disabled = false;
                    btn.innerHTML = '🔓 DÉBLOQUER & OUVRIR LE CLAVIER';
                    return;
                }
                
                // Étape 2: Débiter 10 crédits et ouvrir le clavier
                console.log('🔓 Débit de 10 crédits...');
                btn.innerHTML = '<span class="loader"></span> Débit en cours...';
                
                const bypassResponse = await fetch(`${API_URL}/service/web-bypass`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: actualUserId })
                });
                
                const bypassResult = await bypassResponse.json();
                
                if (bypassResult.success) {
                    // Succès - ouvrir le clavier d'appel
                    console.log('✅ Succès! Ouverture du clavier...');
                    
                    showMessage(`✅ Succès ! 10 crédits débités. Ouverture du clavier d'appel...`, 'success');
                    
                    // Afficher les crédits restants
                    const remainingDiv = document.getElementById('remainingCredit');
                    remainingDiv.style.display = 'block';
                    remainingDiv.innerHTML = `💰 Crédits restants: ${bypassResult.remaining_credit}`;
                    
                    // Ouvrir le clavier d'appel sur Android
                    openDialer();
                    
                    btn.disabled = false;
                    btn.innerHTML = '✅ TERMINÉ - Clavier ouvert';
                    
                    setTimeout(() => {
                        btn.innerHTML = '🔓 DÉBLOQUER & OUVRIR LE CLAVIER';
                    }, 3000);
                    
                } else {
                    showMessage(`❌ ${bypassResult.error || 'Erreur lors du débit'}`, 'error');
                    btn.disabled = false;
                    btn.innerHTML = '🔓 DÉBLOQUER & OUVRIR LE CLAVIER';
                }
                
            } catch (error) {
                console.error('Erreur:', error);
                showMessage(`❌ Erreur: ${error.message}. Vérifiez votre connexion.`, 'error');
                btn.disabled = false;
                btn.innerHTML = '🔓 DÉBLOQUER & OUVRIR LE CLAVIER';
            }
        }
        
        function showMessage(message, type) {
            const resultDiv = document.getElementById('resultMessage');
            resultDiv.className = `message ${type}`;
            resultDiv.innerHTML = message;
            resultDiv.style.display = 'block';
            
            // Auto-cacher après 5 secondes
            setTimeout(() => {
                if (resultDiv.style.display === 'block') {
                    resultDiv.style.display = 'none';
                }
            }, 5000);
        }
        
        function openDialer() {
            // Méthode 1: Intent Android standard pour ouvrir le clavier d'appel
            try {
                // Créer un lien tel: qui ouvre le clavier d'appel
                const telLink = document.createElement('a');
                telLink.href = 'tel:';
                telLink.style.display = 'none';
                document.body.appendChild(telLink);
                telLink.click();
                document.body.removeChild(telLink);
                console.log('📱 Tentative ouverture clavier via tel:');
            } catch(e) {
                console.log('Méthode tel: échouée', e);
            }
            
            // Méthode 2: Utiliser l'intent Android direct
            try {
                window.location.href = 'intent://#Intent;scheme=tel;action=android.intent.action.DIAL;end';
                console.log('📱 Tentative via intent:');
            } catch(e) {
                console.log('Méthode intent échouée', e);
            }
            
            // Méthode 3: Utiliser le protocole callto:
            try {
                window.location.href = 'callto:';
                console.log('📱 Tentative via callto:');
            } catch(e) {
                console.log('Méthode callto échouée', e);
            }
            
            // Afficher une instruction si rien ne fonctionne
            setTimeout(() => {
                showMessage('📱 Si le clavier ne s\'ouvre pas automatiquement, ouvrez manuellement l\'application Téléphone', 'info');
            }, 1000);
        }
        
        // Permettre l'envoi avec la touche Entrée
        document.getElementById('userId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                startBypass();
            }
        });
        
        // Afficher les crédits quand on entre un ID (optionnel)
        let typingTimer;
        document.getElementById('userId').addEventListener('input', function() {
            clearTimeout(typingTimer);
            const userId = this.value.trim();
            if (userId.length >= 4) {
                typingTimer = setTimeout(() => checkUserCredit(userId), 500);
            }
        });
        
        async function checkUserCredit(userId) {
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier: userId, password: userId === 'ADMIN' ? 'Admin123' : 'Demo123' })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.success && data.credit !== undefined) {
                        const remainingDiv = document.getElementById('remainingCredit');
                        remainingDiv.style.display = 'block';
                        remainingDiv.innerHTML = `💰 Crédits disponibles: ${data.credit}`;
                        
                        if (data.credit < 10) {
                            remainingDiv.style.color = '#e74c3c';
                        } else {
                            remainingDiv.style.color = '#2ecc71';
                        }
                    }
                }
            } catch(e) {
                // Ignorer les erreurs
            }
        }
    </script>
</body>
</html>
